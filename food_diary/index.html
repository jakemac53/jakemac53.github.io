<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/food_diary/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="food_analyzer">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>food_analyzer</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      inset: 0;
      overflow: hidden;
      margin: 0;
      padding: 0;
      position: fixed;
      background-color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overscroll-behavior: none;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .logo-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 30px;
    }
    .logo-container img {
      width: 100%;
      height: 100%;
      z-index: 2;
      position: relative;
      animation: pulse 2.5s infinite ease-in-out;
      border-radius: 24px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }
    .logo-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 140%;
      height: 140%;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.2) 0%, rgba(56, 189, 248, 0) 70%);
      z-index: 1;
      animation: glowPulse 2.5s infinite ease-in-out;
    }
    .loading-text {
      color: white;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.6;
      margin-top: 20px;
    }
    .progress-bar-container {
      width: 180px;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      margin-top: 15px;
      overflow: hidden;
    }
    .progress-bar-value {
      width: 30%;
      height: 100%;
      background: #38bdf8;
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
      animation: progressIndeterminate 2s infinite ease-in-out;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    @keyframes glowPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.6; }
    }
    @keyframes progressIndeterminate {
      0% { margin-left: -30%; width: 30%; }
      50% { margin-left: 20%; width: 50%; }
      100% { margin-left: 100%; width: 30%; }
    }
    .fade-out {
      opacity: 0 !important;
      transition: opacity 0.5s ease-in-out !important;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo-container">
      <div class="logo-glow"></div>
      <img src="icons/Icon-192.png" alt="Food Analyzer Logo">
    </div>
    <div class="loading-text">Simmering your insights...</div>
    <div class="progress-bar-container">
      <div class="progress-bar-value"></div>
    </div>
  </div>

  <script>
    window.addEventListener('load', function(ev) {
      // Wait for the first frame to be rendered
      window.addEventListener('flutter-first-frame', function() {
        var loading = document.getElementById('loading');
        if (loading) {
          loading.classList.add('fade-out');
          setTimeout(function() {
            loading.remove();
          }, 500);
        }
      });
    });
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
